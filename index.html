<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Wedding Invite</title>
    <meta name="description" content="Wedding Invite" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Wedding Invite" />
    <meta property="og:description" content="Wedding Invite" />
    <meta property="og:url" content="https://franciscosn.github.io/pagina_boda/" />
    <meta property="og:image" content="https://franciscosn.github.io/pagina_boda/assets/top-hero.jpg" />
    <meta property="og:image:alt" content="Selfie of a couple in the mountains" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Wedding Invite" />
    <meta name="twitter:description" content="Wedding Invite" />
    <meta name="twitter:image" content="https://franciscosn.github.io/pagina_boda/assets/top-hero.jpg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Syne:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-1: #f9eee7;
        --bg-2: #eff8ff;
        --card: rgba(255, 255, 255, 0.72);
        --text: #13141a;
        --muted: #6f7480;
        --accent: #ff4aa4;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Outfit", "Avenir Next", "Helvetica Neue", sans-serif;
        color: var(--text);
        background: radial-gradient(circle at 14% 8%, #ffd9c8 0%, transparent 35%),
          radial-gradient(circle at 88% 90%, #d6efff 0%, transparent 38%),
          linear-gradient(140deg, var(--bg-1), #fcf7f2 44%, var(--bg-2));
        display: grid;
        place-items: center;
        padding: 1.2rem;
      }

      main {
        width: min(96vw, 740px);
        border-radius: 30px;
        background: var(--card);
        border: 1px solid rgba(18, 19, 24, 0.08);
        box-shadow: 0 18px 55px rgba(12, 19, 41, 0.14);
        backdrop-filter: blur(8px);
        padding: clamp(1.2rem, 4vw, 2.3rem);
      }

      .eyebrow {
        margin: 0;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: #b16e97;
        font-size: 0.82rem;
        font-weight: 600;
      }

      h1 {
        margin: 0.45rem 0 0;
        font-family: "Syne", "Outfit", sans-serif;
        font-size: clamp(2rem, 6vw, 3.8rem);
        line-height: 0.95;
        color: transparent;
        background: linear-gradient(135deg, #ff4ab0 0%, #ff2f83 40%, #ff65bb 100%);
        -webkit-background-clip: text;
        background-clip: text;
      }

      p {
        margin: 0.95rem 0 0;
        color: var(--muted);
        font-size: clamp(1rem, 2.2vw, 1.14rem);
      }

      .lang-list {
        margin-top: 1.35rem;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0.7rem;
      }

      .lang-link {
        text-decoration: none;
        border-radius: 16px;
        border: 1px solid rgba(24, 28, 36, 0.12);
        background: #ffffff;
        color: var(--text);
        padding: 0.8rem 0.75rem;
        font-weight: 700;
        font-size: 1.02rem;
        text-align: center;
      }

      .lang-link:hover {
        transform: translateY(-1px);
      }

      .link-note {
        margin-top: 1rem;
        color: #616774;
        font-size: 0.94rem;
      }

      @media (max-width: 760px) {
        .lang-list {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Wedding Website</p>
      <h1>Choose Language</h1>
      <p>Send your guests one dedicated link per language.</p>

      <div class="lang-list">
        <a class="lang-link" href="./de/">Deutsch</a>
        <a class="lang-link" href="./es/">Español</a>
        <a class="lang-link" href="./en/">English</a>
      </div>

      <p class="link-note">Each page refreshes with a fresh version to avoid stale cache.</p>
    </main>
  </body>
</html>
